<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Analysis Studio</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <h1>Chess Analysis Studio</h1>
      <p class="lede">Analyze a game from the current tab when available, or open the standalone analyzer for PGN paste and file upload.</p>
      <div class="actions">
        <button id="analyze-current-game" type="button">Analyze Current Game</button>
        <button id="open-analyzer" type="button" class="secondary">Open Analyzer</button>
      </div>
      <p class="hint">Supported site import is optional. The analyzer also works independently with pasted or uploaded PGN files.</p>
      <p id="popup-status" class="status" aria-live="polite">Ready.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
