<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Review Free</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 280px;
        background: #111827;
        color: #f8fafc;
      }

      main {
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      p {
        margin: 0 0 10px;
        color: #cbd5e1;
        font-size: 13px;
        line-height: 1.4;
      }

      .pill {
        display: inline-block;
        margin-top: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #1e293b;
        color: #93c5fd;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chess Review Free</h1>
      <p>Open a finished Chess.com live game, then use the floating review button on the page.</p>
      <p>This extension is designed for post-game analysis only and does not run during live play.</p>
      <span class="pill">Local Stockfish inside your browser</span>
    </main>
  </body>
</html>
