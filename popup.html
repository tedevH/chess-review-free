<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Move Coach</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <h1>Chess Move Coach</h1>
      <p class="lede">Open the standalone analyzer to paste a PGN and review the game locally with the bundled engine.</p>
      <div class="actions">
        <button id="open-analyzer" type="button">Open Analyzer</button>
      </div>
      <p class="hint">Paste a PGN into the analyzer page to run a full move-by-move review without sending game data to any external server.</p>
      <p id="popup-status" class="status" aria-live="polite">Ready.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
