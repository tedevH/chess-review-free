<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chess Move Coach</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <h1>Chess Move Coach</h1>
      <p class="lede">When you open the extension on a finished Chess.com game, it will import that game and open the analyzer outside Chess.com automatically.</p>
      <div class="actions">
        <button id="import-current-game" type="button">Analyze Current Game</button>
        <button id="open-analyzer" type="button" class="secondary">Open Analyzer Only</button>
      </div>
      <p class="hint">If the current tab is not a finished Chess.com game, you can still open the analyzer page and load a game there.</p>
      <p id="popup-status" class="status" aria-live="polite">Checking the current tab...</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
